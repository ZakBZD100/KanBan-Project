<!DOCTYPE html>
<html lang="en">
<head xmlns:th="http://www.thymeleaf.org">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Create Column</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/libs/bootstrap/bootstrap.min.css}">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Create New Column</h3>
        <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
    </div>

    <form id="column_create_form" th:action="@{/columns/create}" method="post" accept-charset="UTF-8">

        <input type="hidden" name="projectId" th:value="${projectId}">

        <div class="mb-3">
            <label class="form-label">Column Name*</label>
            <input id="column_name" class="form-control" type="text" name="name" maxlength="25" required>
            <div class="form-text">Max 25 characters</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Order*</label>
            <input id="column_order" class="form-control" type="number" name="order" value="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Limit*</label>
            <input id="column_limit" class="form-control" type="number" name="limit" value="5" min="1" required>
        </div>

        <div class="mb-3 form-check">
            <input id="column_hasSubColumns" class="form-check-input" type="checkbox" name="hasSubColumns" value="true" checked>
            <label class="form-check-label" for="column_hasSubColumns">
                Has Sub-Columns (Backlog / Done)
            </label>
            <div class="form-text">Check this if you want this column to have Backlog and Done sub-columns</div>
        </div>

        <button type="submit" class="btn btn-primary">Create</button>
        <a th:href="@{/columns}" class="btn btn-secondary">Cancel</a>

    </form>
</div>
<script th:src="@{/libs/bootstrap/bootstrap.bundle.min.js}"></script>
<script>
    document.getElementById('column_create_form').addEventListener('submit', function(e) {
        const nameInput = document.getElementById('column_name');
        if (nameInput.value.length > 25) {
            e.preventDefault();
            alert('Column name must not exceed 25 characters!');
            nameInput.focus();
            return false;
        }
    });
</script>
</body>
</html>
