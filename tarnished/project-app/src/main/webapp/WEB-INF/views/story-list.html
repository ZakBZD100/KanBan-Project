<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Stories List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/libs/bootstrap/bootstrap.min.css}">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
        .status-badge {
            font-size: 0.875rem;
            padding: 0.25rem 0.5rem;
        }
        .status-BACKLOG { background-color: #6c757d; }
        .status-IN_PROGRESS { background-color: #0d6efd; }
        .status-REVIEW { background-color: #ffc107; color: #000; }
        .status-DONE { background-color: #198754; }
        .status-BLOCKED { background-color: #dc3545; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Stories</h1>
            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
                <a th:href="@{/story/new}" class="btn btn-success" id="newStoryBtn">
                    + New Story
                </a>
            </div>
        </div>
        
        <div id="storiesList">
            <!--message si aucune story-->
            <div th:if="${stories.isEmpty()}" class="alert alert-info">
                No stories yet. Create your first story!
            </div>
            
            <!--liste des stories-->
            <div class="row">
                <div th:each="story : ${stories}" 
                     class="col-md-6 mb-3"
                     th:id="${'story-' + story.id}">
                    <div class="card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title mb-0" th:text="${story.title}">Story Title</h5>
                                <span class="badge status-badge"
                                      th:classappend="${'status-' + story.status}"
                                      th:text="${#strings.replace(story.status.toString(), '_', ' ')}">TODO</span>
                            </div>
                            
                            <div class="mt-2">
                                <small class="text-muted">
                                    Created: <span th:text="${#dates.format(story.dateCreated, 'dd/MM/yyyy')}">01/01/2025</span>
                                </small>
                            </div>
                            
                            <div class="mt-3">
                                <a th:href="@{'/story/' + ${story.id}}" class="btn btn-primary btn-sm">
                                    Details
                                </a>
                                <a th:href="@{'/story/' + ${story.id} + '/edit'}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>
                                <button class="btn btn-danger btn-sm"
                                        th:onclick="'showDeleteConfirm(' + ${story.id} + ')'">
                                    Delete
                                </button>
                            </div>
                            

                        </div>
                    </div>
                    <div th:id="'confirmCard-' + ${story.id}" class="card mt-2" style="display:none;">
                        <div class="card-body">
                            <h6>Do you really want to delete this story?</h6>
                            <div class="mt-2">
                                <form th:action="@{'/story/' + ${story.id} + '/delete'}" method="post">
                                    <button type="submit" class="btn btn-danger btn-sm">Yes, delete</button>
                                </form>
                                <button class="btn btn-secondary btn-sm"
                                        th:onclick="'hideDeleteConfirm(' + ${story.id} + ')'">
                                    No
                                </button>
                            </div>
                        </div>
                    </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function showDeleteConfirm(id) {
            document.getElementById("confirmCard-" + id).style.display = "block";
        }
        function hideDeleteConfirm(id) {
            document.getElementById("confirmCard-" + id).style.display = "none";
        }
    </script>
    <script th:src="@{/libs/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
