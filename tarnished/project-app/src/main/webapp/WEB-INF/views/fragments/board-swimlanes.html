<div class="swimlane-board-wrapper">
<div class="swimlane-board" th:fragment="swimlaneBoard">
    <!--les lignes de swimlane iront ici-->
    <div th:each="lane, iterStat : ${swimlanes}">
        <div class="swimlane-row"
             th:data-swimlane-id="${lane.id}">

        <!--label de swimlane-->
        <div class="swimlane-label">
            <span th:text="${lane.name}">Swimlane</span>

            <!--actions optionnelles-->
            <div class="swimlane-actions">
                <button type="button"
                        class="btn btn-sm btn-outline-secondary"
                        style="padding: 2px 8px; font-size: 0.8em;"
                        title="Edit swimlane"
                        th:data-swimlane-id="${lane.id}"
                        th:onclick="|editSwimlane(this.getAttribute('data-swimlane-id'))|">
                    <i class="bi bi-pencil"></i>
                </button>

                <!--bouton Delete-->
                <button type="button"
                        class="btn btn-sm btn-outline-danger"
                        title="Delete swimlane"
                        th:data-delete-url="@{/swimlane/delete/{id}(id=${lane.id})}"
                        th:onclick="|confirmDeleteSwimlane(this)|">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>

        <!--même container qu'avant-->
        <div class="kanban-container" th:id="'kanban-container-' + ${lane.id}">
            <!--colonne pour chaque colonne de workflow-->
            <div th:each="column : ${columns}"
                 class="kanban-column"
                 th:id="'column-' + ${column.id}"
                 th:data-column-id="${column.id}"
                 ondrop="drop(event)"
                 ondragover="allowDrop(event)"
                 ondragleave="dragLeave(event)">

                <div class="column-header" th:if="${lane == swimlanes[0]}">
                    <span th:text="${#strings.replace(column.name, '_', ' ')}"
                          th:id="'column-name-' + ${column.id}"
                          th:attr="draggable=${column.name != 'BACKLOG'}"
                          ondragstart="dragColumn(event)"
                          th:style="${column.name == 'BACKLOG'} ? 'flex-grow: 1; cursor: default;' : 'cursor: move; flex-grow: 1;'">Column Name</span>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <span class="column-capacity" th:if="${column.maxCapacity > 0}">
                            <span th:text="${column.stories != null ? column.stories.size() : 0}">0</span>/<span th:text="${column.maxCapacity}">5</span>
                        </span>
                        <!--bouton Edit pour toutes les colonnes-->
                        <button onclick="editColumn(this)"
                                th:attr="data-column-id=${column.id},data-column-name=${column.name},data-column-capacity=${column.maxCapacity}"
                                class="btn btn-sm btn-outline-secondary"
                                style="padding: 2px 8px; font-size: 0.8em;"
                                draggable="false"
                                title="Edit column">
                            Edit
                        </button>
                        <!--bouton Delete uniquement pour les colonnes non-BACKLOG/DONE-->
                        <button th:if="${column.name != 'BACKLOG' and column.name != 'DONE'}"
                                type="button"
                                th:attr="data-column-id=${column.id},data-story-count=${column.stories.size()}"
                                onclick="deleteColumn(this)"
                                class="btn btn-sm btn-outline-danger"
                                style="padding: 2px 8px; font-size: 0.8em;"
                                draggable="false"
                                title="Delete column">
                            X
                        </button>
                    </div>
                </div>

                <!--pour BACKLOG, DONE et BLOCKED de base: structure simple-->
                <div th:if="${column.name == 'BACKLOG' or column.name == 'DONE' or column.name == 'BLOCKED'}" style="flex-grow: 1; display: flex; flex-direction: column;">
                    <button class="btn btn-outline-secondary btn-sm add-story-btn"
                            th:onclick="'addStoryToColumn(' + ${project.id} + ', ' + ${column.id} + ', ' + ${lane.id} + ')' "
                            title="Add story to this swimlane"
                            style="margin-bottom: 10px;">
                        + Add Story
                    </button>

                    <!--stories dans cette colonne-->
                    <div class="column-stories" style="flex-grow: 1;"
                         ondrop="drop(event)"
                         ondragover="allowDrop(event)"
                         ondragleave="dragLeave(event)">
                        <div th:each="story : ${column.stories}"
                             th:if="${story.swimlaneId == lane.id}"
                             class="story-card"
                             th:id="'story-' + ${story.id}"
                             th:data-story-id="${story.id}"
                             draggable="true"
                             ondragstart="drag(event)"
                             ondragover="storyDragOver(event)"
                             ondrop="storyDrop(event)">

                            <div class="story-title" th:text="${story.title}">Story Title</div>

                            <div class="story-meta">
                                <span class="badge status-badge"
                                      th:classappend="${'status-' + story.status}"
                                      th:text="${#strings.replace(story.status.toString(), '_', ' ')}">BACKLOG</span>

                                <div class="mt-2" th:if="${story.totalTimeSpent > 0}">
                                    <i class="bi bi-clock"></i>
                                    <span class="duration-display" th:attr="data-minutes=${story.totalTimeSpent}" th:text="${story.totalTimeSpent + ' min'}">0 min</span>
                                </div>
                            </div>

                            <div class="story-actions">
                                <a th:href="@{'/story/' + ${story.id}}"
                                   class="btn btn-sm btn-outline-primary">
                                    Details
                                </a>
                                <a th:href="@{'/story/' + ${story.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-warning">
                                    Edit
                                </a>
                                <form th:if="${story.getRunningWorkLog() == null}"
                                      th:action="@{'/story/' + ${story.id} + '/timer/start'}"
                                      method="post"
                                      style="display: inline; margin: 0;">
                                    <button type="submit" class="btn btn-sm btn-success" title="Start Timer">Start</button>
                                </form>
                                <form th:if="${story.getRunningWorkLog() != null}"
                                      th:action="@{'/story/' + ${story.id} + '/timer/stop'}"
                                      method="post"
                                      style="display: inline; margin: 0;">
                                    <input type="hidden" name="workLogId" th:value="${story.getRunningWorkLog().id}"/>
                                    <button type="submit" class="btn btn-sm btn-danger" title="Stop Timer">Stop</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!--pour les colonnes personnalisées sans sous-colonnes-->
                <div th:if="${column.name != 'BACKLOG' and column.name != 'DONE' and column.name != 'BLOCKED' and !column.hasSubColumns}"
                     style="flex-grow: 1; display: flex; flex-direction: column;">
                    <button class="btn btn-outline-secondary btn-sm add-story-btn"
                            th:onclick="'addStoryToColumn(' + ${project.id} + ', ' + ${column.id} + ', ' + ${lane.id} + ')' "
                            title="Add story to this swimlane"
                            style="margin-bottom: 10px;">
                        + Add Story
                    </button>

                    <!--stories dans cette colonne-->
                    <div class="column-stories" style="flex-grow: 1;"
                         ondrop="drop(event)"
                         ondragover="allowDrop(event)"
                         ondragleave="dragLeave(event)">
                        <div th:each="story : ${column.stories}"
                             th:if="${story.swimlaneId == lane.id}"
                             class="story-card"
                             th:id="'story-' + ${story.id}"
                             th:data-story-id="${story.id}"
                             draggable="true"
                             ondragstart="drag(event)"
                             ondragover="storyDragOver(event)"
                             ondrop="storyDrop(event)">

                            <div class="story-title" th:text="${story.title}">Story Title</div>

                            <div class="story-meta">
                                <span class="badge status-badge"
                                      th:classappend="${'status-' + story.status}"
                                      th:text="${#strings.replace(story.status.toString(), '_', ' ')}">STATUS</span>

                                <div class="mt-2" th:if="${story.totalTimeSpent > 0}">
                                    <i class="bi bi-clock"></i>
                                    <span class="duration-display" th:attr="data-minutes=${story.totalTimeSpent}" th:text="${story.totalTimeSpent + ' min'}">0 min</span>
                                </div>
                            </div>

                            <div class="story-actions">
                                <a th:href="@{'/story/' + ${story.id}}"
                                   class="btn btn-sm btn-outline-primary">
                                    Details
                                </a>
                                <a th:href="@{'/story/' + ${story.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-warning">
                                    Edit
                                </a>
                                <form th:if="${story.getRunningWorkLog() == null}"
                                      th:action="@{'/story/' + ${story.id} + '/timer/start'}"
                                      method="post"
                                      style="display: inline; margin: 0;">
                                    <button type="submit" class="btn btn-sm btn-success" title="Start Timer">Start</button>
                                </form>
                                <form th:if="${story.getRunningWorkLog() != null}"
                                      th:action="@{'/story/' + ${story.id} + '/timer/stop'}"
                                      method="post"
                                      style="display: inline; margin: 0;">
                                    <input type="hidden" name="workLogId" th:value="${story.getRunningWorkLog().id}"/>
                                    <button type="submit" class="btn btn-sm btn-danger" title="Stop Timer">Stop</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

                <!--pour les colonnes avec sous-colonnes: Backlog/Done-->
                <div th:if="${column.hasSubColumns}"
                     style="display: flex; flex-direction: row; gap: 10px; flex-grow: 1;">

                    <!--sous-colonne BACKLOG-->
                    <div class="subcolumn-backlog" style="background: #e9ecef; border-radius: 6px; padding: 10px; flex: 1; display: flex; flex-direction: column;">
                        <div style="font-weight: 600; font-size: 0.9em; margin-bottom: 8px; color: #495057;">Backlog</div>
                        <div class="column-stories"
                             style="flex-grow: 1; min-height: 150px;">
                            <div th:each="story : ${column.stories}"
                                 th:if="${(story.subColumn == null or story.subColumn != 'DONE') and story.swimlaneId == lane.id}"
                                 class="story-card"
                                 th:id="'story-' + ${story.id}"
                                 th:data-story-id="${story.id}"
                                 draggable="true"
                                 ondragstart="drag(event)"
                                 ondragover="storyDragOver(event)"
                                 ondrop="storyDrop(event)">

                                <div class="story-title" th:text="${story.title}">Story Title</div>

                                <div class="story-meta">
                                    <span class="badge status-badge"
                                          th:classappend="${'status-' + story.status}"
                                          th:text="${#strings.replace(story.status.toString(), '_', ' ')}">STATUS</span>

                                    <div class="mt-2" th:if="${story.totalTimeSpent > 0}">
                                        <i class="bi bi-clock"></i>
                                        <span class="duration-display" th:attr="data-minutes=${story.totalTimeSpent}" th:text="${story.totalTimeSpent + ' min'}">0 min</span>
                                    </div>
                                </div>

                                <div class="story-actions">
                                    <a th:href="@{'/story/' + ${story.id}}"
                                       class="btn btn-sm btn-outline-primary">
                                        Details
                                    </a>
                                    <a th:href="@{'/story/' + ${story.id} + '/edit'}"
                                       class="btn btn-sm btn-outline-warning">
                                        Edit
                                    </a>
                                    <form th:if="${story.getRunningWorkLog() == null}"
                                          th:action="@{'/story/' + ${story.id} + '/timer/start'}"
                                          method="post"
                                          style="display: inline; margin: 0;">
                                        <button type="submit" class="btn btn-sm btn-success" title="Start Timer">Start</button>
                                    </form>
                                    <form th:if="${story.getRunningWorkLog() != null}"
                                          th:action="@{'/story/' + ${story.id} + '/timer/stop'}"
                                          method="post"
                                          style="display: inline; margin: 0;">
                                        <input type="hidden" name="workLogId" th:value="${story.getRunningWorkLog().id}"/>
                                        <button type="submit" class="btn btn-sm btn-danger" title="Stop Timer">Stop</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-outline-secondary btn-sm"
                                th:onclick="'addStoryToColumn(' + ${project.id} + ', ' + ${column.id} + ', ' + ${lane.id} + ')' "
                                title="Add story to this swimlane"
                                style="margin-top: 8px; width: 100%; font-size: 0.85em;">
                            + Add Story
                        </button>
                    </div>

                    <!--sous-colonne DONE-->
                    <div class="subcolumn-done" style="background: #d1e7dd; border-radius: 6px; padding: 10px; flex: 1; display: flex; flex-direction: column;">
                        <div style="font-weight: 600; font-size: 0.9em; margin-bottom: 8px; color: #0f5132;">Done</div>
                        <div class="column-stories"
                             style="flex-grow: 1; min-height: 150px;"
                             ondrop="storyDrop(event)"
                             ondragover="allowDrop(event)">
                            <div th:each="story : ${column.stories}"
                                 th:if="${story.subColumn == 'DONE' and story.swimlaneId == lane.id}"
                                 class="story-card"
                                 th:id="'story-' + ${story.id}"
                                 th:data-story-id="${story.id}"
                                 draggable="true"
                                 ondragstart="drag(event)"
                                 ondragover="storyDragOver(event)"
                                 ondrop="storyDrop(event)">

                                <div class="story-title" th:text="${story.title}">Story Title</div>

                                <div class="story-meta">
                                    <span class="badge status-badge"
                                          th:classappend="${'status-' + story.status}"
                                          th:text="${#strings.replace(story.status.toString(), '_', ' ')}">STATUS</span>

                                    <div class="mt-2" th:if="${story.totalTimeSpent > 0}">
                                        <i class="bi bi-clock"></i>
                                        <span class="duration-display" th:attr="data-minutes=${story.totalTimeSpent}" th:text="${story.totalTimeSpent + ' min'}">0 min</span>
                                    </div>
                                </div>

                                <div class="story-actions">
                                    <a th:href="@{'/story/' + ${story.id}}"
                                       class="btn btn-sm btn-outline-primary">
                                        Details
                                    </a>
                                    <a th:href="@{'/story/' + ${story.id} + '/edit'}"
                                       class="btn btn-sm btn-outline-warning">
                                        Edit
                                    </a>
                                    <form th:if="${story.getRunningWorkLog() == null}"
                                          th:action="@{'/story/' + ${story.id} + '/timer/start'}"
                                          method="post"
                                          style="display: inline; margin: 0;">
                                        <button type="submit" class="btn btn-sm btn-success" title="Start Timer">Start</button>
                                    </form>
                                    <form th:if="${story.getRunningWorkLog() != null}"
                                          th:action="@{'/story/' + ${story.id} + '/timer/stop'}"
                                          method="post"
                                          style="display: inline; margin: 0;">
                                        <input type="hidden" name="workLogId" th:value="${story.getRunningWorkLog().id}"/>
                                        <button type="submit" class="btn btn-sm btn-danger" title="Stop Timer">Stop</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!--bouton pour ajouter une nouvelle colonne-->
            <div class="kanban-column" style="background: transparent; border: 2px dashed #dee2e6;">
                <button class="btn btn-outline-secondary" onclick="showAddColumnForm(this)">
                    + Add Column
                </button>

                <form th:action="@{'/board/' + ${project.id} + '/add-column'}"
                      method="post"
                      class="add-column-form"
                      accept-charset="UTF-8"
                      style="display:none; margin-top: 15px;">
                    <div class="mb-2">
                        <input type="text"
                               id="column_name"
                               class="form-control form-control-sm column-name-input"
                               name="name"
                               placeholder="Column Name"
                               maxlength="25"
                               required>
                        <small class="form-text text-muted">Max 25 characters</small>
                    </div>
                    <div class="mb-2">
                        <input type="number"
                               name="maxCapacity"
                               class="form-control form-control-sm"
                               placeholder="Max Capacity (0 = unlimited)"
                               min="0">
                    </div>
                    <div class="mb-2 form-check">
                        <input type="checkbox"
                               id="hasSubColumns"
                               class="form-check-input"
                               name="hasSubColumns"
                               value="true"
                               checked>
                        <label class="form-check-label" for="hasSubColumns">
                            Has Sub-Columns (Backlog / Done)
                        </label>
                    </div>
                    <button type="submit" id="createColumnBtn" class="btn btn-primary btn-sm">Create</button>
                    <button type="button" class="btn btn-secondary btn-sm" onclick="hideAddColumnForm(this)">Cancel</button>
                </form>
            </div>
        </div>
        </div>
        
        <!-- Ligne de séparation entre les swimlanes -->
        <div th:if="${!iterStat.last}" class="swimlane-divider"></div>
    </div>
</div>
</div>
