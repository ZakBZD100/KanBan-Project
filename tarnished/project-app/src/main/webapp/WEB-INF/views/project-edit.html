<!DOCTYPE html>
<html lang="en">
<head xmlns:th="http://www.thymeleaf.org">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Edit Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/libs/bootstrap/bootstrap.min.css}">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Edit Project</h3>
        <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
    </div>

    <form th:action="@{'/project/edit/' + ${project.id}}" method="post" accept-charset="UTF-8">

        <!--nom-->
        <div class="mb-3">
            <label class="form-label">Project Name*</label>
            <input class="form-control" type="text" id="projectName" name="name"
                   th:value="${project.name}" maxlength="29" required>
            <div class="form-text">Max 29 characters</div>
        </div>

        <!--description-->
        <div class="mb-3">
            <label class="form-label">Description*</label>
            <textarea class="form-control" id="projectDescription" name="description"
                      rows="3" maxlength="120"
                      th:text="${project.description}"></textarea>
            <div class="form-text">Max 120 characters</div>
        </div>

        <!--bouton pour afficher le formulaire de membres-->
        <button type="button" class="btn btn-secondary mb-3"
                onclick="toggleMemberForm()">
            Add Members
        </button>

        <!--section membres cachée-->
        <div id="memberForm" style="display:none;" class="border p-3 rounded">

            <h5>Select Members</h5>

            <!--barre de recherche-->
            <input type="text" class="form-control mb-3"
                   placeholder="Search users..."
                   onkeyup="filterUsers(this)">

            <!--liste des utilisateurs-->
            <div id="user-list">
                <div th:each="user : ${users}" class="form-check mb-2">
                    <input class="form-check-input"
                           type="checkbox"
                           name="memberIds"
                           th:value="${user.id}"
                           th:checked="${memberIds.contains(user.id)}">
                    <label class="form-check-label" th:text="${user.getName()}"></label>
                </div>
            </div>

        </div>

        <!--soumettre-->
        <button type="submit" id="updateProjectBtn" class="btn btn-primary mt-3">
            Save Changes
        </button>

    </form>
</div>
<script th:src="@{/libs/bootstrap/bootstrap.bundle.min.js}"></script>
<script>
    function toggleMemberForm() {
        const f = document.getElementById("memberForm");
        f.style.display = f.style.display === "none" ? "block" : "none";
    }

    function filterUsers(input) {
        const filter = input.value.toLowerCase();
        const users = document.querySelectorAll("#user-list .form-check");

        users.forEach(u => {
            const name = u.innerText.toLowerCase();
            u.style.display = name.includes(filter) ? "" : "none";
        });
    }
</script>
</body>
</html>
