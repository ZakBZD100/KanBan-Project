<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Edit Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/libs/bootstrap/bootstrap.min.css}">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Edit Story</h3>
        <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
    </div>

    <form th:action="@{'/story/' + ${story.id} + '/edit'}" method="post" accept-charset="UTF-8">

        <!--titre-->
        <div class="mb-3">
            <label class="form-label">Story Title*</label>
                 <input class="form-control" type="text" name="title"
                     th:value="${story.title}" id="storyTitle" required maxlength="59">
                 <div class="form-text">Max 59 characters</div>
        </div>

        <!--description-->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description"
                      rows="4" id="storyDescription"
                      th:text="${story.description}"></textarea>
        </div>

        <!--status-->
        <div class="mb-3">
            <label class="form-label">Status</label>
            <select class="form-select" name="status" id="storyStatus" 
                    th:attr="data-readonly=${isDefaultColumn != null and isDefaultColumn}">
                <option value="BACKLOG" th:selected="${story.status == T(fr.uha.ensisa.gl.entities.StoryStatus).BACKLOG}">BACKLOG</option>
                <option value="IN_PROGRESS" th:selected="${story.status == T(fr.uha.ensisa.gl.entities.StoryStatus).IN_PROGRESS}">IN PROGRESS</option>
                <option value="REVIEW" th:selected="${story.status == T(fr.uha.ensisa.gl.entities.StoryStatus).REVIEW}">REVIEW</option>
                <option value="DONE" th:selected="${story.status == T(fr.uha.ensisa.gl.entities.StoryStatus).DONE}">DONE</option>
                <option value="BLOCKED" th:selected="${story.status == T(fr.uha.ensisa.gl.entities.StoryStatus).BLOCKED}">BLOCKED</option>
            </select>
            <small class="text-muted" th:if="${isDefaultColumn != null and isDefaultColumn}">
                Status is automatically set by the column. Move story to a custom column to change status manually.
            </small>
        </div>

        <!--section utilisateur assigné-->
        <div class="mb-3">
            <label class="form-label">Assigned User</label>
            <div class="row">
                <div class="col-md-8">
                    <select class="form-select" id="assignUserSelect">
                        <option value="">Select a user to assign...</option>
                        <option th:each="user : ${users}" 
                                th:value="${user.id}"
                                th:text="${user.name}">User Name</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-info btn-sm" id="assignUserBtn" onclick="assignUser()">
                        Assign User
                    </button>
                </div>
            </div>
            
            <!--affichage de l'utilisateur assigné actuel-->
            <div class="mt-2" th:if="${story.userAssigned != null}">
                <small class="text-muted">
                    Currently assigned to: <strong th:text="${story.userAssigned.name}">User Name</strong>
                    <button type="button" class="btn btn-outline-secondary btn-sm ms-2" onclick="unassignUser()">Unassign</button>
                </small>
            </div>
            <div class="mt-2" th:unless="${story.userAssigned != null}">
                <small class="text-muted">No user assigned</small>
            </div>
        </div>

        <!--soumettre-->
        <button type="submit" class="btn btn-primary mt-3" id="saveStoryBtn">
            Save Changes
        </button>
        
        <a th:href="@{'/story/' + ${story.id}}" class="btn btn-secondary mt-3">
            Cancel
        </a>
        
        <button type="button" class="btn btn-danger mt-3" onclick="confirmDelete()">
            Delete Story
        </button>

    </form>
    
    <!--formulaire de suppression caché-->
    <form th:id="'deleteForm-' + ${story.id}" th:action="@{'/story/' + ${story.id} + '/delete'}" method="post" style="display:none;">
    </form>
</div>

<script th:src="@{/libs/bootstrap/bootstrap.bundle.min.js}"></script>
<script th:inline="javascript">
    //Base URL avec context path
    const baseUrl = /*[[@{/}]]*/ '';
    
    //Handle readonly status select
    document.addEventListener('DOMContentLoaded', function() {
        const statusSelect = document.getElementById('storyStatus');
        if (statusSelect && statusSelect.dataset.readonly === 'true') {
            statusSelect.style.backgroundColor = '#e9ecef';
            statusSelect.style.cursor = 'not-allowed';
            statusSelect.addEventListener('mousedown', function(e) {
                e.preventDefault();
            });
        }
    });

    function assignUser() {
        const select = document.getElementById('assignUserSelect');
        const userId = select.value;
        const storyId = [[${story.id}]];
        
        if (userId) {
            //Use window.location instead of creating a form to avoid conflicts
            window.location.href = baseUrl + 'story/' + storyId + '/assign?userId=' + userId;
        } else {
            alert('Please select a user to assign.');
        }
    }

    function unassignUser() {
        const storyId = [[${story.id}]];
        if (confirm('Unassign user from this story?')) {
            window.location.href = baseUrl + 'story/' + storyId + '/unassign';
        }
    }
    
    function confirmDelete() {
        const storyId = [[${story.id}]];
        if (confirm('Are you sure you want to delete this story? This action cannot be undone.')) {
            document.getElementById('deleteForm-' + storyId).submit();
        }
    }
</script>
</body>
</html>
