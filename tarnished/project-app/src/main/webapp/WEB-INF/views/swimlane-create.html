<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Create Swimlane</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/libs/bootstrap/bootstrap.min.css}">
    <style>
        * { font-family: 'Space Grotesk', system-ui, sans-serif !important; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Create New Swimlane</h1>
        <a th:href="@{/}" class="btn btn-outline-secondary">Home</a>
    </div>

    <form th:action="@{/swimlane/create}" method="POST" accept-charset="UTF-8">
        <!--champ caché pour projectId-->
        <input type="hidden" name="projectId" th:value="${projectId}" />

        <div class="mb-3">
            <label for="swimlaneName" class="form-label">Swimlane Name *</label>
            <input type="text"
                   class="form-control"
                   id="swimlaneName"
                   name="name"
                   required
                   maxlength="29"
                   placeholder="My Swimlane">
            <div class="form-text">Max 29 characters</div>
        </div>

        <button type="submit" class="btn btn-primary" id="createSwimlaneBtn">
            Create Swimlane
        </button>
        <a th:href="@{/board/{projectId}(projectId=${projectId})}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script th:src="@{/libs/bootstrap/bootstrap.bundle.min.js}"></script>
</body>
</html>
